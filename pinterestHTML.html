<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pinterest Practica Pedro</title>


<!--  META ETIQUETAS-->
<!-- Describe brevemente el contenido de tu página -->
<meta name="description" content="Galería de ideas al estilo Pinterest" />
<!-- Robots: permite indexar, seguir enlaces -->
<meta name="robots" content="index,follow" />
<link rel="canonical" href="https://example.com/" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: system-ui, Arial, Helvetica, sans-serif;
      background: #f1eded;
      color: #222;
      line-height: 1.45;
    }
    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; height: auto; display: block; }

    header {
      background: #ffffff;
      border-bottom: 1px solid #eee;
      padding: 12px 16px;
    }
    .header-contenido {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo { font-weight: bold; }
    .buscador { margin-left: auto; }
    .buscador input {
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }

    nav {
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .nav-wrap {
      max-width: 1000px; margin: 0 auto; padding: 6px 16px;
    }
    .nav-list {
      display: flex; gap: 8px; list-style: none; padding: 8px 0; margin: 0;
    }
    .nav-list a {
      padding: 6px 10px; border: 1px solid #ddd; border-radius: 999px; font-size: 0.95rem; background: #fff;
    }
    .nav-list a:hover { border-color: #222; }

    /* CONTENIDO PRINCIPAL */
    main { max-width: 1000px; margin: 16px auto; padding: 0 16px 32px; }

    /* DISEÑO EN COLUMNA */
    /* Con column-count creamos varias columnas */
    .galeria { column-count: 4; column-gap: 12px; }
    @media (max-width: 900px) { .galeria { column-count: 3; } }
    @media (max-width: 600px) { .galeria { column-count: 2; } }
    @media (max-width: 400px) { .galeria { column-count: 1; } }

    
    .pin {
      break-inside: avoid;
      margin-bottom: 12px;
      background: #fff;
      border: 1px solid #eee;
      border-radius: 8px;
      overflow: hidden;
    }
    .pin h3 {
      font-size: 1rem; margin: 0; padding: 8px 10px; border-top: 1px solid #f1f1f1;
    }

    
    footer {
      border-top: 1px solid #eee; background: #fff; padding: 16px; text-align: center; color: #666; font-size: .95rem;
    }
  </style>
</head>
<body>
    <!--  CABECERA en el header metemos titulo y form -->
<header>
<div class="header-contenido">
<!-- Logo -->
<a class="logo" href="/">PedroPint</a>


<!-- Buscador accesible y simple -->
<form class="buscador" role="search" action="/buscar" method="get">
<!-- La etiqueta label ayuda a accesibilidad. Mantengo el texto visible para principiantes. -->
<label for="q">Buscar:</label>
<input id="q" name="q" type="search" placeholder="Recetas, decoración, viajes…" />
</form>
</div>
</header>


<!-- NAVEGACIÓN PRINCIPAL-->
<nav aria-label="Categorías principales">
<div class="nav-wrap">
<ul class="nav-list">
<!-- URLs amigables: rutas cortas y descriptivas -->
<li><a href="/ideas/tendencias">Tendencias</a></li>
<li><a href="/ideas/decoracion">Decoración</a></li>
<li><a href="/ideas/recetas">Recetas</a></li>
<li><a href="/ideas/viajes">Viajes</a></li>
<li><a href="/ideas/diy">DIY</a></li>
</ul>
</div>
</nav>


<!-- CONTENIDO PRINCIPAL -->
<main>
<h1 style="position:absolute;left:-9999px;">Ideas</h1>


<!-- Sección de galería con columnas -->
<section class="galeria" aria-label="Ideas destacadas">


<!-- PIN 1 -->
<article class="pin">
<img src="https://cocinaconnoelia.com/wp-content/uploads/2024/02/racion-tarta-de-queso-scaled.webp"
alt="Porción de tarta de queso cremosa"
width="600" height="800" loading="lazy" />
<h3>Tarta de queso</h3>
</article>


<!-- PIN 2 -->
<article class="pin">
<img src="https://cdn.shopify.com/s/files/1/0272/1392/2339/products/Sansevieria_Laurentti_comprar_plantas_online_medidas.jpg?v=1685362159"
alt="plantas para salón"
width="600" height="750" loading="lazy" />
<h3>Decoración con plantas</h3>
</article>


<!-- PIN 3 -->
<article class="pin">
<img src="https://dynamic-media.tacdn.com/media/photo-o/30/33/90/d9/caption.jpg?w=700&h=500&s=1"
alt="Cristo Redentor en Río de Janeiro"
width="600" height="750" loading="lazy" />
<h3>Viaje Brasil</h3>
</article>



</section>
</main>


<!-- PIE DE PÁGINA SENCILLO -->
<footer>
<p>Practica PEDRO</p>
</footer>
</body>
</html>
